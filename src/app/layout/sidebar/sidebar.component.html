@if (mobileOpen()) {
  <div class="sb-mobile-backdrop" (click)="closeMobile()"></div>
}

<aside class="sidebar" [class.collapsed]="collapsed()" [class.open]="mobileOpen()" id="sidebar">

  <div class="sb-brand">
    <div class="sb-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 6C3 4.34315 4.34315 3 6 3H18C19.6569 3 21 4.34315 21 6V8C21 9.65685 19.6569 11 18 11H6C4.34315 11 3 9.65685 3 8V6Z" fill="rgba(255,255,255,0.90)"/>
        <path d="M3 16C3 14.3431 4.34315 13 6 13H11C12.6569 13 14 14.3431 14 16V18C14 19.6569 12.6569 21 11 21H6C4.34315 21 3 19.6569 3 18V16Z" fill="rgba(255,255,255,0.60)"/>
        <path d="M17 16C17 14.3431 18.3431 13 20 13C21.6569 13 23 14.3431 23 16C23 17.6569 21.6569 19 20 19C18.3431 19 17 17.6569 17 16Z" fill="rgba(255,255,255,0.40)"/>
      </svg>
    </div>
    <div class="sb-brand-text">
      <span class="sb-brand-name">{{ brand.name }}</span>
      <span class="sb-brand-tag">{{ brand.tag }}</span>
    </div>
    <button
      class="sb-collapse-btn"
      type="button"
      [title]="collapsed() ? 'Expandir menu' : 'Colapsar menu'"
      (click)="toggleCollapsed()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <nav class="sb-nav">
    <span class="sb-nav-label">Menu</span>

    <!-- 1. Dashboard -->
    <button
      class="sb-item"
      [class.active]="isActive('dashboard')"
      data-tooltip="Dashboard"
      (click)="selectSection('dashboard')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="currentColor"/>
        <rect x="10.5" y="1" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity=".55"/>
        <rect x="1" y="10.5" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity=".55"/>
        <rect x="10.5" y="10.5" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity=".55"/>
      </svg>
      <span class="sb-item-text">Dashboard</span>
    </button>

    <!-- 2. Transacciones -->
    <button
      class="sb-item"
      [class.active]="isParentActive('transacciones', transaccionesChildren)"
      [class.open]="isMenuOpen('transacciones')"
      data-tooltip="Transacciones"
      (click)="toggleMenu('transacciones')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <path d="M5 4L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3 9H11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M11 4L14 7L11 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 14L4 11L7 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 14H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="sb-item-text">Transacciones</span>
      <svg class="sb-item-chevron" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 5L7 8.5L10.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    @if (isMenuOpen('transacciones')) {
      <ul class="sb-submenu">
        <li>
          <button class="sb-subitem" [class.active]="isActive('depositar')" (click)="selectSection('depositar', 'transacciones')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2V9M7 9L4.5 6.5M7 9L9.5 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11H12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Depositar
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('retiros')" (click)="selectSection('retiros', 'transacciones')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 9V2M7 2L4.5 4.5M7 2L9.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11H12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Retiros
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('transferencias')" (click)="selectSection('transferencias', 'transacciones')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 5H12M12 5L9.5 2.5M12 5L9.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 9H2M2 9L4.5 6.5M2 9L4.5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Transferencias
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('historial-tx')" (click)="selectSection('historial-tx', 'transacciones')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 4.5V7L8.5 8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Historial
          </button>
        </li>
      </ul>
    }

    <!-- 3. Trading -->
    <button
      class="sb-item"
      [class.active]="isParentActive('trading', tradingChildren)"
      [class.open]="isMenuOpen('trading')"
      data-tooltip="Trading"
      (click)="toggleMenu('trading')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <polyline points="1,14 5,8 9,11 13,4 17,7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1 16H17" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span class="sb-item-text">Trading</span>
      <svg class="sb-item-chevron" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 5L7 8.5L10.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    @if (isMenuOpen('trading')) {
      <ul class="sb-submenu">
        <li>
          <button class="sb-subitem" [class.active]="isActive('crear-cuenta')" (click)="selectSection('crear-cuenta', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 4.5V9.5M4.5 7H9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Crear cuenta
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('mis-cuentas')" (click)="selectSection('mis-cuentas', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 3.5H12M2 7H12M2 10.5H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Mis cuentas
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('webtrader')" (click)="selectSection('webtrader', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M2 7H12M7 1.5C8.5 3.5 9 5.2 9 7C9 8.8 8.5 10.5 7 12.5M7 1.5C5.5 3.5 5 5.2 5 7C5 8.8 5.5 10.5 7 12.5" stroke="currentColor" stroke-width="1.2"/></svg>
            WebTrader
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('tradingview')" (click)="selectSection('tradingview', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2" width="11" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M4 8L6 5.5L8 7L10 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            TradingView
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('social-trader')" (click)="selectSection('social-trader', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 12C1 10 2.8 8.5 5 8.5C5.7 8.5 6.3 8.6 6.9 8.9M8 12C8 10 9.2 8.5 10.5 8.5C12.2 8.5 13 10 13 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Social Trader
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('copy-trading')" (click)="selectSection('copy-trading', 'trading')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="1.5" width="7" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 4.5H11.5C12.0523 4.5 12.5 4.94772 12.5 5.5V11.5C12.5 12.0523 12.0523 12.5 11.5 12.5H5.5" stroke="currentColor" stroke-width="1.3"/></svg>
            Copy Trading
          </button>
        </li>
      </ul>
    }

    <!-- 4. Productos -->
    <button
      class="sb-item"
      [class.active]="isParentActive('productos', productosChildren)"
      [class.open]="isMenuOpen('productos')"
      data-tooltip="Productos"
      (click)="toggleMenu('productos')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="10" width="3" height="6" rx="0.8" fill="currentColor" opacity=".45"/>
        <rect x="7.5" y="6" width="3" height="10" rx="0.8" fill="currentColor" opacity=".7"/>
        <rect x="13" y="2" width="3" height="14" rx="0.8" fill="currentColor"/>
      </svg>
      <span class="sb-item-text">Productos</span>
      <svg class="sb-item-chevron" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 5L7 8.5L10.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    @if (isMenuOpen('productos')) {
      <ul class="sb-submenu">
        <li>
          <button class="sb-subitem" [class.active]="isActive('leverage-12x')" (click)="selectSection('leverage-12x', 'productos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 10L6 3L10 8L13 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Leverage 12X
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('prop-firm')" (click)="selectSection('prop-firm', 'productos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 3V1.5H9V3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 6.5H12" stroke="currentColor" stroke-width="1.2"/></svg>
            Prop Firm
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('bin-plus')" (click)="selectSection('bin-plus', 'productos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="2" y="2" width="10" height="3" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="6" width="10" height="3" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="10" width="10" height="3" rx="1" stroke="currentColor" stroke-width="1.3" opacity=".5"/></svg>
            Bin Plus
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('pamm-account')" (click)="selectSection('pamm-account', 'productos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 1.5V7L10.5 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            PAMM Account
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('ecn-account')" (click)="selectSection('ecn-account', 'productos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 5L13 5.5L9.5 8.5L10.5 13L7 10.5L3.5 13L4.5 8.5L1 5.5L5.5 5L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            ECN Account
          </button>
        </li>
      </ul>
    }

    <!-- 5. Programa de Referidos -->
    <button
      class="sb-item"
      [class.active]="isParentActive('referidos', referidosChildren)"
      [class.open]="isMenuOpen('referidos')"
      data-tooltip="Referidos"
      (click)="toggleMenu('referidos')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <path d="M9 2L11 6.5L16 7.2L12.5 10.5L13.3 15.5L9 13.2L4.7 15.5L5.5 10.5L2 7.2L7 6.5L9 2Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
      </svg>
      <span class="sb-item-text">Programa de Referidos</span>
      <svg class="sb-item-chevron" viewBox="0 0 14 14" fill="none">
        <path d="M3.5 5L7 8.5L10.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    @if (isMenuOpen('referidos')) {
      <ul class="sb-submenu">
        <li>
          <button class="sb-subitem" [class.active]="isActive('resumen-ib')" (click)="selectSection('resumen-ib', 'referidos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2" width="3" height="10" rx=".8" stroke="currentColor" stroke-width="1.3"/><rect x="5.5" y="5" width="3" height="7" rx=".8" stroke="currentColor" stroke-width="1.3"/><rect x="9.5" y="3.5" width="3" height="8.5" rx=".8" stroke="currentColor" stroke-width="1.3"/></svg>
            Resumen IB
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('mi-comunidad')" (click)="selectSection('mi-comunidad', 'referidos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="5" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 12C1 10 2.8 8.5 5 8.5C5.7 8.5 6.3 8.6 6.9 8.9M8 12C8 10 9.2 8.5 10.5 8.5C12.2 8.5 13 10 13 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Mi comunidad
          </button>
        </li>
        <li>
          <button class="sb-subitem" [class.active]="isActive('centro-puntos')" (click)="selectSection('centro-puntos', 'referidos')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4.5L12.5 5L9.75 7.5L10.5 11.5L7 9.5L3.5 11.5L4.25 7.5L1.5 5L5.5 4.5L7 1Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
            Centro de puntos
          </button>
        </li>
      </ul>
    }

    <!-- 6. Utilidades -->
    <button
      class="sb-item"
      [class.active]="isActive('utilidades')"
      data-tooltip="Utilidades"
      (click)="selectSection('utilidades')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <path d="M7.5 2H10.5L11 4.5C11.5 4.7 12 5 12.4 5.4L14.8 4.5L16.3 7L14.5 8.5C14.5 8.8 14.5 9.2 14.5 9.5L16.3 11L14.8 13.5L12.4 12.6C12 13 11.5 13.3 11 13.5L10.5 16H7.5L7 13.5C6.5 13.3 6 13 5.6 12.6L3.2 13.5L1.7 11L3.5 9.5C3.5 9.2 3.5 8.8 3.5 8.5L1.7 7L3.2 4.5L5.6 5.4C6 5 6.5 4.7 7 4.5L7.5 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <circle cx="9" cy="9" r="2" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="sb-item-text">Utilidades</span>
    </button>

    <!-- 7. Perfil -->
    <button
      class="sb-item"
      [class.active]="isActive('perfil')"
      data-tooltip="Perfil"
      (click)="selectSection('perfil')">
      <svg class="sb-item-icon" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M2.5 16C2.5 12.5 5.3 10 9 10C12.7 10 15.5 12.5 15.5 16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="sb-item-text">Perfil</span>
    </button>

  </nav>

</aside>

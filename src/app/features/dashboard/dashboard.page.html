<section class="dashboard-page">
  <header class="page-header">
    <p class="page-header__eyebrow">{{ eyebrow() }}</p>
    <h1 class="page-header__title">{{ title() }}</h1>
    <p class="page-header__subtitle">{{ subtitle() }}</p>
  </header>

  <div class="placeholder-card">
    <div class="placeholder-card__inner">
      <div class="placeholder-card__icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.8" opacity=".5"/>
          <rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.8" opacity=".5"/>
          <rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.8" opacity=".5"/>
        </svg>
      </div>
      <span class="placeholder-card__text">{{ placeholderTitle() }}</span>
      <span class="placeholder-card__sub">{{ placeholderSub() }}</span>
    </div>
  </div>
</section>

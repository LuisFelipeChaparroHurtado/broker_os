<div class="icon-glow-wrapper">
  <div class="icon-glow">
    <svg viewBox="0 0 24 24" fill="none" stroke="url(#iconGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      <circle class=""cx="12" cy="16" r="1"/>
    </svg>
  </div>
</div>

<h2 class="ds-heading ds-heading--lg">Recuperar contraseña</h2>
<p class="ds-subtitle" style="margin-bottom: 28px">
  Ingresa tu email registrado y te enviaremos un enlace de recuperación
</p>

@if (errorMessage()) {
  <div class="alert-error">{{ errorMessage() }}</div>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="on">
  <div class="field-group">
    <label class="ds-label" for="email">Correo electrónico</label>
    <app-input
      type="email"
      placeholder="nombre@ejemplo.com"
      formControlName="email"
      size="lg"
      [state]="emailError ? 'error' : 'default'"
    >
      <span slot="icon-left" class="ds-input-icon-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="22,4 12,13 2,4"/>
        </svg>
      </span>
    </app-input>
    @if (emailError) {
      <span class="ds-error-text">{{ emailError }}</span>
    }
  </div>

  <!-- Metodo de verificacion 2FA -->
  <app-tfa-method-selector
    label="Recibe tu código por:"
    [selected]="selectedMethod()"
    [disabled]="isLoading()"
    (selectedChange)="selectMethod($event)"
  ></app-tfa-method-selector>

  <app-btn
    type="submit"
    variant="gradient"
    size="lg"
    [full]="true"
    [loading]="isLoading()"
    [disabled]="!canSubmit()"
  >
    Enviar enlace
  </app-btn>
</form>

<p class="bottom-link">
  ¿Recordaste tu contraseña?
  <app-link href="#" (click)="loginLink.emit(); $event.preventDefault()">Inicia sesión</app-link>
</p>

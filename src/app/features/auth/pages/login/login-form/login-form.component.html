<h2 class="ds-heading ds-heading--lg">Iniciar Sesion</h2>
<p class="ds-subtitle" style="margin-bottom: 32px">Ingresa tus credenciales</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="on">

  <!-- Email -->
  <div class="field-group">
    <app-input
      type="email"
      placeholder="Correo electronico"
      formControlName="email"
      size="lg"
      [state]="emailError ? 'error' : 'default'"
    >
      <span slot="icon-left" class="ds-input-icon-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
      </span>
    </app-input>
    @if (emailError) {
      <span class="ds-error-text">{{ emailError }}</span>
    }
  </div>

  <!-- Password -->
  <div class="field-group">
    <div class="password-wrapper">
      <app-input
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="Contrasena"
        formControlName="password"
        size="lg"
        [state]="passwordError ? 'error' : 'default'"
      >
        <span slot="icon-left" class="ds-input-icon-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
      </app-input>
      <button type="button" class="password-toggle" [class.active]="showPassword()" (click)="togglePassword()">
        <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    @if (passwordError) {
      <span class="ds-error-text">{{ passwordError }}</span>
    }
  </div>

  <!-- Remember + Forgot -->
  <div class="form-extras">
    <app-checkbox label="Recordarme" formControlName="remember"></app-checkbox>
    <app-link href="#" (click)="forgotPassword.emit(); $event.preventDefault()">Olvidaste tu contrasena?</app-link>
  </div>

  <!-- Submit -->
  <app-btn type="submit" variant="gradient" size="lg" [full]="true" [loading]="isLoading()" [disabled]="!canSubmit">
    Continuar
  </app-btn>

</form>

<p class="register-text">
  No tienes cuenta? <app-link href="#" (click)="register.emit(); $event.preventDefault()">Registrate</app-link>
</p>

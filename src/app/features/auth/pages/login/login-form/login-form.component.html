<h2 class="ds-heading ds-heading--xl">Iniciar Sesión</h2>
<p class="ds-subtitle" style="margin-bottom: 32px">Accede a tu cuenta de trading</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate autocomplete="on">

  <!-- Email -->
  <div class="field-group">
    <label class="ds-label" for="login-email">Correo electrónico</label>
    <app-input
      type="email"
      placeholder="nombre@ejemplo.com"
      formControlName="email"
      size="lg"
      [state]="emailError ? 'error' : 'default'"
    >
      <span slot="icon-left" class="ds-input-icon-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
      </span>
    </app-input>
    @if (emailError) {
      <span class="ds-error-text">{{ emailError }}</span>
    }
  </div>

  <!-- Password -->
  <div class="field-group">
    <label class="ds-label" for="login-password">Contraseña</label>
    <div class="password-wrapper">
      <app-input
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="Minimo 8 caracteres"
        formControlName="password"
        size="lg"
        [state]="passwordError ? 'error' : 'default'"
      >
        <span slot="icon-left" class="ds-input-icon-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
      </app-input>
      <app-password-toggle [visible]="showPassword()" (toggle)="togglePassword()"></app-password-toggle>
    </div>
    @if (passwordError) {
      <span class="ds-error-text">{{ passwordError }}</span>
    }
  </div>

  

  <!-- Metodo de verificacion 2FA -->
  <app-tfa-method-selector
    label="Recibe tu código por:"
    [selected]="selectedMethod()"
    [disabled]="isLoading()"
    (selectedChange)="selectMethod($event)"
  ></app-tfa-method-selector>

  <!-- Remember + Forgot -->
  <div class="form-extras">
    <app-checkbox label="Recordarme" formControlName="remember"></app-checkbox>
    <app-link href="#" (click)="forgotPassword.emit(); $event.preventDefault()">Olvidaste tu contraseña?</app-link>
  </div>

  <!-- Continuar -->
  <app-btn type="submit" variant="gradient" size="lg" [full]="true" [loading]="isLoading()" [disabled]="!canSubmit">
    Continuar
  </app-btn>

</form>

<p class="register-text">
  No tienes cuenta? <app-link href="#" (click)="register.emit(); $event.preventDefault()">Registrate</app-link>
</p>

<!-- SVG gradient definitions for step icons -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(142,49,237)"/>
      <stop offset="100%" stop-color="#1EDBA6"/>
    </linearGradient>
  </defs>
</svg>

<div class="recovery-wrapper">
  <app-brand-panel
    taglinePre="Recupera el acceso"
    taglineMid="a tu "
    taglineAccent="cuenta"
    [subtitle]="brandSubtitle"
    [pills]="recoveryPills"
  ></app-brand-panel>

  <section class="form-panel" aria-label="Formulario de Recuperación">
    <div class="recovery-card">
      <!-- Step Indicator -->
      <div class="step-indicator">
        <div
          class="step-pill"
          [class.active]="currentStep() === 1"
          [class.completed]="currentStep() > 1"
        ></div>
        <div
          class="step-pill"
          [class.active]="currentStep() === 2"
        ></div>
      </div>

      <!-- Step 1: Request email -->
      @if (currentStep() === 1) {
        <app-forgot-password-form
          [isLoading]="isLoading()"
          [errorMessage]="errorMessage()"
          (submitForm)="onRequestEmail($event)"
          (loginLink)="onLoginLink()"
        ></app-forgot-password-form>
      }

      <!-- Step 2: New password -->
      @if (currentStep() === 2) {
        <app-new-password-form
          [isLoading]="isLoading()"
          [errorMessage]="errorMessage()"
          [successState]="successState()"
          (submitForm)="onResetPassword($event)"
          (loginLink)="onLoginLink()"
        ></app-new-password-form>
      }
    </div>
  </section>
</div>

<app-theme-toggle></app-theme-toggle>

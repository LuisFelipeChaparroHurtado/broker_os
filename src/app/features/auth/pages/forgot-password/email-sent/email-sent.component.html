<div class="icon-glow-wrapper">
  <div class="icon-glow icon-glow--lg">
    <svg viewBox="0 0 40 40" width="40" height="40" fill="none"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

      <defs>
        <linearGradient id="iconGradMail" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="rgb(142,49,237)"/>
          <stop offset="100%" stop-color="#1EDBA6"/>
        </linearGradient>
      </defs>

      <rect x="4" y="10" width="24" height="18" rx="3"
            stroke="url(#iconGradMail)"/>
      <polyline points="4,10 16,21 28,10"
                stroke="url(#iconGradMail)"/>
      <circle cx="30" cy="14" r="8"
              stroke="url(#iconGradMail)"/>
      <polyline points="26,14 29,17 34,11"
                stroke="url(#iconGradMail)"/>
    </svg>
  </div>
</div>

<h2 class="ds-heading ds-heading--md">¡Email enviado!</h2>
<p class="ds-subtitle">
  Hemos enviado un enlace de recuperación a
  <strong class="masked-email">{{ maskedEmail() }}</strong>
</p>
<p class="note-text">Revisa tu bandeja de entrada y la carpeta de spam</p>

<div class="actions">
  <app-btn
    variant="ghost"
    size="md"
    [full]="true"
    [disabled]="!canResend()"
    (btnClick)="onResend()"
  >
    Reenviar email
  </app-btn>

  @if (!canResend()) {
    <span class="countdown-text">{{ countdownText() }}</span>
  }

  <app-btn
    variant="gradient"
    size="lg"
    [full]="true"
    (btnClick)="haveCode.emit()"
  >
    Ya recibí el enlace
  </app-btn>
</div>

<p class="bottom-link">
  <app-link href="#" variant="muted" (click)="back.emit(); $event.preventDefault()">
    Volver al inicio
  </app-link>
</p>

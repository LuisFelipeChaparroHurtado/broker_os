<section class="brand-panel" aria-label="Broker OS Brand">
  <div class="brand-panel-border"></div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="brand-header">
    <div class="brand-logo">
      <div class="brand-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      Broker <span class="logo-os">OS</span>
    </div>
  </div>

  <div class="brand-center">
    <h1 class="brand-tagline">
      {{ taglinePre() }}<br>{{ taglineMid() }}<span class="accent">{{ taglineAccent() }}</span>
    </h1>
    <p class="brand-subtitle">{{ subtitle() }}</p>
    <div class="feature-pills">
      @for (pill of pills(); track pill.label) {
        <div class="feature-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            @switch (pill.icon) {
              @case ('shield') {
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              }
              @case ('lock') {
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              }
              @case ('clock') {
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              }
              @case ('check-circle') {
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              }
              @case ('dollar') {
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              }
              @case ('chat') {
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              }
              @case ('monitor') {
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              }
            }
          </svg>
          {{ pill.label }}
        </div>
      }
    </div>
  </div>

  <footer class="brand-footer">
    &copy; 2026 Broker OS. Todos los derechos reservados.
  </footer>
</section>

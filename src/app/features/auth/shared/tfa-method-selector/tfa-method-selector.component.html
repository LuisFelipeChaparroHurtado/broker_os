<p class="tfa-label">{{ label() }}</p>
<div class="tfa-methods" role="radiogroup" [attr.aria-label]="label()">
  @for (m of methods(); track m.id) {
    <button
      type="button"
      class="tfa-method"
      role="radio"
      [attr.aria-checked]="selected() === m.id"
      [class.is-selected]="selected() === m.id"
      [disabled]="disabled()"
      (click)="select(m.id)"
    >
      @switch (m.id) {
        @case ('email') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="22,4 12,13 2,4"/>
          </svg>
        }
        @case ('sms') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2"/>
            <line x1="12" y1="18" x2="12.01" y2="18"/>
          </svg>
        }
        @case ('authenticator') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        }
      }
      <span class="tfa-method-label">{{ m.label }}</span>
      <span class="tfa-method-hint">{{ m.hint }}</span>
    </button>
  }
</div>

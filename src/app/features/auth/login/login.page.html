<div class="login-wrapper">
  <app-brand-panel [pills]="brandPills"></app-brand-panel>

  <section class="form-panel">
    <div class="login-card">
      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step-dot" [class.active]="!awaitingOtp()" [class.completed]="awaitingOtp()"></div>
        <div class="step-dot" [class.active]="awaitingOtp()"></div>
      </div>

      <!-- Step 1: Credentials -->
      @if (!awaitingOtp()) {
        <app-login-form
          [isLoading]="loading()"
          (submitForm)="onLogin($event)"
          (register)="onRegisterLink()"
          (forgotPassword)="onForgotPasswordLink()"
        ></app-login-form>
      }

      <!-- Step 2: 2FA -->
      @if (awaitingOtp()) {
        <app-tfa-form
          [isLoading]="loading()"
          (submitCode)="onVerify2FA($event)"
          (resendCode)="onResendCode()"
          (backToLogin)="onBackToLogin()"
        ></app-tfa-form>
      }
    </div>
  </section>
</div>
<app-theme-toggle></app-theme-toggle>

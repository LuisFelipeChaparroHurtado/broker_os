@if (modalService.state().open) {
  <div class="modal-backdrop" (click)="confirm(false)">
    <div class="ds-modal-preview" (click)="$event.stopPropagation()" role="dialog" [attr.aria-label]="modalService.state().title">

      <div class="ds-modal-header">
        <h2 class="ds-modal-title">{{ modalService.state().title }}</h2>
        <button class="ds-modal-close" aria-label="Cerrar" (click)="confirm(false)">&#x2715;</button>
      </div>

      @if (modalService.state().message) {
        <div class="ds-modal-body">
          {{ modalService.state().message }}
        </div>
      }

      <ng-content></ng-content>

      <div class="ds-modal-footer">
        <button
          class="ds-btn ds-btn--ghost ds-btn--sm"
          (click)="confirm(false)"
        >{{ modalService.state().cancelLabel ?? 'Cancelar' }}</button>

        <button
          class="ds-btn ds-btn--sm"
          [class.ds-btn--danger]="modalService.state().danger"
          [class.ds-btn--primary]="!modalService.state().danger"
          (click)="confirm(true)"
        >{{ modalService.state().confirmLabel ?? 'Confirmar' }}</button>
      </div>
    </div>
  </div>
}

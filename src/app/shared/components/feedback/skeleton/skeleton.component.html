<!-- Text rows -->
@if (type() === 'text') {
  @for (_ of rowArray(); track $index; let i = $index) {
    <div
      class="ds-skeleton"
      [style.height]="height()"
      [style.width]="i === rowArray().length - 1 ? '65%' : width()"
      [style.margin-bottom]="'8px'"
    ></div>
  }
}

<!-- Circle -->
@if (type() === 'circle') {
  <div
    class="ds-skeleton"
    [style.width]="width()"
    [style.height]="width()"
    style="border-radius: 50%"
  ></div>
}

<!-- Rect -->
@if (type() === 'rect') {
  <div
    class="ds-skeleton"
    [style.width]="width()"
    [style.height]="height()"
  ></div>
}

<!-- Table -->
@if (type() === 'table') {
  <!-- Header -->
  <div class="ds-skeleton" style="height:36px;margin-bottom:2px;border-radius:var(--radius-md)"></div>
  <!-- Rows -->
  @for (_ of rowArray(); track $index) {
    <div
      class="ds-skeleton"
      style="height:48px;margin-bottom:2px;border-radius:var(--radius-md)"
    ></div>
  }
}

<!-- Card -->
@if (type() === 'card') {
  <div class="ds-skeleton-card">
    <div class="ds-skeleton-row">
      <div class="ds-skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="ds-skeleton" style="height:14px;width:60%"></div>
        <div class="ds-skeleton" style="height:12px;width:40%"></div>
      </div>
    </div>
    <div class="ds-skeleton" style="height:80px;border-radius:var(--radius-md)"></div>
    <div style="display:flex;gap:8px">
      <div class="ds-skeleton" style="height:32px;flex:1;border-radius:var(--radius-md)"></div>
      <div class="ds-skeleton" style="height:32px;flex:1;border-radius:var(--radius-md)"></div>
    </div>
  </div>
}

<div class="ds-accordion">
  @for (item of items(); track item.title; let i = $index) {
    <div class="ds-accordion-item">
      <button class="ds-accordion-trigger" [class.open]="isOpen(i)" (click)="toggle(i)">
        {{ item.title }}
        <svg class="ds-accordion-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="ds-accordion-body" [class.open]="isOpen(i)">
        <div class="ds-accordion-content">{{ item.content }}</div>
      </div>
    </div>
  }
</div>
